# fly launch / fly deploy — run from vizzel-go-app/
app = "vizzel-track-demo-boss"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  ADDR = ":8080"
  # Demo dataset wiped via migration 026 — production org is seeded by ELAAS import.
  SEED_ASSET_COUNT = "0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
